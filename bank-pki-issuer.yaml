apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: equity-bank-ca
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: core-banking-tls
  namespace: default
spec:
  secretName: core-banking-tls-secret
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  subject:
    organizations:
      - Equity-SRE-Lab
  commonName: core-banking.default.svc.cluster.local
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  issuerRef:
    name: equity-bank-ca
    kind: ClusterIssuer
